redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  db: ${REDIS_DB}
  password: ${REDIS_PASSWORD}
  
  # Cache configurations
  cache:
    llm_responses:
      ttl: 2592000  # 30 days
      key_prefix: "llm:response:"
    parsed_jds:
      ttl: 2592000  # 30 days
      key_prefix: "jd:parsed:"
    resume_analysis:
      ttl: 2592000  # 30 days
      key_prefix: "resume:analysis:"
    user_preferences:
      ttl: 3600  # 1 hour
      key_prefix: "user:prefs:"
    scoring_results:
      ttl: 604800  # 7 days
      key_prefix: "score:"
  
  # Queue configuration
  queue:
    broker_url: ${CELERY_BROKER_URL}
    result_backend: ${CELERY_RESULT_BACKEND}
  
  # Session management
  sessions:
    ttl: 1800  # 30 minutes
    key_prefix: "session:"
  
  # Rate limiting
  rate_limiting:
    key_prefix: "ratelimit:"
    window: 3600  # 1 hour
