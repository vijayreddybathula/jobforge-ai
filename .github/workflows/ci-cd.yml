name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY_URL }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: jobforge_password
          POSTGRES_DB: jobforge_ai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        export PATH="$HOME/.local/bin:$PATH"

    - name: Cache Poetry dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pypoetry
        key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: |
        poetry install --no-root

    - name: Lint with flake8
      run: |
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check code formatting with black
      run: |
        poetry run black --check .

    - name: Type check with mypy
      run: |
        poetry run mypy services/ --ignore-missing-imports || true

    - name: Run unit tests
      run: |
        poetry run pytest tests/unit/ -v --cov=services --cov-report=xml

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://postgres:jobforge_password@localhost:5432/jobforge_ai
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        AZURE_OPENAPI_KEY: ${{ secrets.AZURE_OPENAPI_KEY }}
        AZURE_OPENAPI_ENDPOINT: ${{ secrets.AZURE_OPENAPI_ENDPOINT }}
      run: |
        poetry run pytest tests/integration/ -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Push to GitHub Container Registry on all events
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for GHCR
      id: meta-ghcr
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push web image to GHCR
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infra/docker/Dockerfile.web
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}-web
        labels: ${{ steps.meta-ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push worker image to GHCR
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infra/docker/Dockerfile.worker
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}-worker
        labels: ${{ steps.meta-ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Push to Azure Container Registry on merge (main/develop push)
    - name: Log in to Azure Container Registry
      if: github.event_name == 'push' && env.ACR_REGISTRY != ''
      uses: docker/login-action@v2
      with:
        registry: ${{ env.ACR_REGISTRY }}
        username: ${{ env.ACR_USERNAME }}
        password: ${{ env.ACR_PASSWORD }}

    - name: Extract metadata for ACR
      id: meta-acr
      if: github.event_name == 'push'
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.ACR_REGISTRY }}/jobforge
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push web image to ACR
      if: github.event_name == 'push' && env.ACR_REGISTRY != ''
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infra/docker/Dockerfile.web
        push: true
        tags: ${{ steps.meta-acr.outputs.tags }}-web
        labels: ${{ steps.meta-acr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push worker image to ACR
      if: github.event_name == 'push' && env.ACR_REGISTRY != ''
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./infra/docker/Dockerfile.worker
        push: true
        tags: ${{ steps.meta-acr.outputs.tags }}-worker
        labels: ${{ steps.meta-acr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here

    - name: Run smoke tests on staging
      run: |
        echo "Running smoke tests on staging..."
        # Add your staging smoke test commands here

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here

    - name: Run health checks
      run: |
        echo "Running health checks..."
        # Add your production health check commands here

    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Production deployment ${{ job.status }}'
      if: always()
